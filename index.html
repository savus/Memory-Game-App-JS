<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/base.css" />
    <link rel="stylesheet" href="./src/css/index.css" />
    <script src="./dist/app.js" type="module" defer></script>
    <title>Document</title>
  </head>
  <body>
    <div class="screen-container">
      <div class="modal game-screen message-box">
        <div class="modal-overlay">
          <div class="modal-body">
            <div class="title">Message Box</div>
            <div class="message-box-text">This is a message</div>
            <div class="button-controls" data-mode="yes_and_no">
              <button class="yes-button">Yes</button>
              <button class="no-button">No</button>
              <button class="next-button">Next</button>
              <button class="prev-button">Prev</button>
              <button class="confirm-button">Ok</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal game-screen main-menu active">
        <div class="modal-overlay">
          <div class="modal-body">
            <div class="title">Concentration: Memory Game</div>
            <ul class="menu-items ul-defaults-none">
              <li>
                <div class="menu-item">
                  Login
                  <div class="bullet-point-outline">
                    <div class="bullet-point"></div>
                  </div>
                </div>
              </li>
              <li id="new-game">
                <div class="menu-item">
                  New Game
                  <div class="bullet-point-outline">
                    <div class="bullet-point"></div>
                  </div>
                </div>
              </li>
              <li>
                <div class="menu-item">
                  How to Play
                  <div class="bullet-point-outline">
                    <div class="bullet-point"></div>
                  </div>
                </div>
              </li>
              <li>
                <div class="menu-item">
                  Quit
                  <div class="bullet-point-outline">
                    <div class="bullet-point"></div>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
      <div class="modal game-screen login-menu">Login Menu</div>
      <div class="modal game-screen main-game">
        <div class="game-ui">
          <div class="points-container">
            <div class="points-display">
              <div class="player-points">Points: 0</div>
              <div class="incoming-points">+ 0</div>
            </div>
          </div>
          <div class="message-container">
            <div class="game-message">Match</div>
          </div>
        </div>

        <div class="card-container container">

    </div>
